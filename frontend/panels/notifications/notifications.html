<div id="notifications">

  <div id="notifications-header">
    <input id="notifications-search" placeholder="Search notifications...">

    <select id="notifications-filter-level">
      <option value="all">All Levels</option>
      <option value="info">Info</option>
      <option value="success">Success</option>
      <option value="warning">Warning</option>
      <option value="error">Error</option>
    </select>

    <select id="notifications-filter-plugin">
      <option value="all">All Plugins</option>
    </select>

    <select id="notifications-filter-category">
      <option value="all">All Categories</option>
    </select>
  </div>

  <div id="notifications-body">
    <div id="notifications-list"></div>
    <div id="notifications-inspector">
      <h3>Notification Details</h3>
      <pre id="notifications-inspector-content">Select a notification...</pre>
    </div>
  </div>

</div>
