<div id="ssh-panel">
  <div id="ssh-toolbar">
    <input id="ssh-host" placeholder="host" />
    <input id="ssh-user" placeholder="user" />
    <input id="ssh-port" type="number" value="22" />
    <button id="ssh-connect">Connect</button>
    <button id="ssh-disconnect">Disconnect</button>
    <span id="ssh-status"></span>
  </div>
  <div id="ssh-output"></div>
  <input id="ssh-input" placeholder="Enter command..." />
</div>
