<div id="system-monitor">
  <div class="sys-card">
    <h3>CPU Usage</h3>
    <canvas id="cpu-chart"></canvas>
  </div>

  <div class="sys-card">
    <h3>Memory Usage</h3>
    <canvas id="memory-chart"></canvas>
  </div>

  <div class="sys-card">
    <h3>Storage</h3>
    <div id="storage-bar">
      <div id="storage-used"></div>
    </div>
    <p id="storage-text"></p>
  </div>

  <div class="sys-card">
    <h3>Network</h3>
    <canvas id="network-chart"></canvas>
  </div>

  <div class="sys-card">
    <h3>Temperature</h3>
    <p id="temp-value">Loading...</p>
  </div>

  <div class="sys-card">
    <h3>System Health</h3>
    <div id="health-score">--</div>
  </div>
</div>
