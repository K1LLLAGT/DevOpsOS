<div id="git-panel">
  <h2>Git</h2>
  <button id="git-refresh">Refresh</button>
  <pre id="git-status"></pre>
  <h3>Diff</h3>
  <pre id="git-diff"></pre>
  <input id="git-commit-msg" placeholder="Commit message">
  <button id="git-commit-btn">Commit</button>
  <button id="git-push-btn">Push</button>
</div>
