<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOpsOS Dashboard</title>

    <!-- Panel Styles -->
    <link rel="stylesheet" href="panels/terminal/terminal.css">
    <link rel="stylesheet" href="panels/editor/editor.css">
    <link rel="stylesheet" href="panels/system/system.css">
    <link rel="stylesheet" href="panels/process/process.css">
    <link rel="stylesheet" href="panels/plugins/plugins.css">
    <link rel="stylesheet" href="panels/ssh/ssh.css">
    <link rel="stylesheet" href="panels/tor/tor.css">

    <!-- Navigation UI -->
    <link rel="stylesheet" href="ui/nav.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1b1b1b;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        #connection-status {
            position: fixed;
            top: 8px;
            right: 12px;
            padding: 6px 12px;
            background: #000;
            border-radius: 4px;
            font-size: 12px;
            z-index: 2000;
            opacity: 0.85;
        }

        .panel-wrapper {
            height: 100vh;
            width: 100%;
            display: none;
            overflow-y: auto;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Smooth fade-in for panels */
        .panel-wrapper.fade-in {
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
</head>

<body>

    <div id="connection-status">loading…</div>

    <div id="sidebar">
        <div class="nav-item" data-target="terminal-container">Terminal</div>
        <div class="nav-item" data-target="editor-container-wrapper">Editor</div>
        <div class="nav-item" data-target="system-container-wrapper">System</div>
        <div class="nav-item" data-target="process-container-wrapper">Processes</div>
        <div class="nav-item" data-target="plugins-container-wrapper">Plugins</div>
        <div class="nav-item" data-target="ssh-container-wrapper">SSH</div>
        <div class="nav-item" data-target="tor-container-wrapper">Tor</div>
    </div>

    <div id="main-content">
        <div id="terminal-container" class="panel-wrapper"></div>
        <div id="editor-container-wrapper" class="panel-wrapper"></div>
        <div id="system-container-wrapper" class="panel-wrapper"></div>
        <div id="process-container-wrapper" class="panel-wrapper"></div>
        <div id="plugins-container-wrapper" class="panel-wrapper"></div>
        <div id="ssh-container-wrapper" class="panel-wrapper"></div>
        <div id="tor-container-wrapper" class="panel-wrapper"></div>
    </div>

    <script type="module">
        import { ws } from './js/core/ws.js';
        import { health } from './js/core/health.js';
        import { initStatusIndicator } from './js/core/ui.js';
        import { initNavigation } from './ui/nav.js';

        import { initTerminal } from './panels/terminal/terminal.js';
        import { initEditor } from './panels/editor/editor.js';
        import { initSystemPanel } from './panels/system/system.js';
        import { initProcessPanel } from './panels/process/process.js';
        import { initPluginsPanel } from './panels/plugins/plugins.js';
        import { initSSHPanel } from './panels/ssh/ssh.js';
        import { initTorPanel } from './panels/tor/tor.js';

        ws.connect();
        health.start();
        initStatusIndicator();

        const panels = [
            ['terminal-container', 'panels/terminal/terminal.html', initTerminal],
            ['editor-container-wrapper', 'panels/editor/editor.html', initEditor],
            ['system-container-wrapper', 'panels/system/system.html', initSystemPanel],
            ['process-container-wrapper', 'panels/process/process.html', initProcessPanel],
            ['plugins-container-wrapper', 'panels/plugins/plugins.html', initPluginsPanel],
            ['ssh-container-wrapper', 'panels/ssh/ssh.html', initSSHPanel],
            ['tor-container-wrapper', 'panels/tor/tor.html', initTorPanel],
        ];

        for (const [id, url, initFn] of panels) {
            fetch(url)
                .then(r => r.text())
                .then(html => {
                    const el = document.getElementById(id);
                    el.innerHTML = html;
                    initFn();
                });
        }

        initNavigation();
    </script>

</body>
</html>
